<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Far North Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e8f4f8;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      background: linear-gradient(180deg, #0a0e1a 0%, #0d1f3c 100%);
    }

    header h1 {
      font-size: 2.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a8d8f0;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.4);
    }

    header p {
      margin-top: 0.6rem;
      color: #7aafc8;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
    }

    /* Filter bar */
    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      padding: 1.5rem 1rem;
    }

    .filters button {
      background: transparent;
      border: 1px solid #2a4a6a;
      color: #a8d8f0;
      padding: 0.4rem 1.1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .filters button:hover,
    .filters button.active {
      background: #1a3a5c;
      border-color: #4a9abf;
    }

    /* Gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      padding: 1rem 2rem 3rem;
      max-width: 1300px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      background: #0d1f3c;
      border: 1px solid #1a3a5c;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 32px rgba(0, 140, 220, 0.25);
    }

    .card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .card .info {
      padding: 0.75rem 1rem;
    }

    .card .info h3 {
      font-size: 0.95rem;
      color: #d0eaf8;
      margin-bottom: 0.2rem;
    }

    .card .info span {
      font-size: 0.78rem;
      color: #5a8faa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 25, 0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 1rem;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 75vh;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0, 160, 255, 0.2);
    }

    .lightbox .caption {
      margin-top: 1rem;
      font-size: 1rem;
      color: #a8d8f0;
      text-align: center;
    }

    .lightbox .close-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: #a8d8f0;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    .lightbox .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10, 40, 80, 0.7);
      border: 1px solid #2a4a6a;
      color: #a8d8f0;
      font-size: 1.6rem;
      width: 2.8rem;
      height: 2.8rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox .nav-btn:hover { background: rgba(30, 80, 140, 0.9); }
    .lightbox .prev { left: 1rem; }
    .lightbox .next { right: 1rem; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #2a4a6a;
      font-size: 0.8rem;
      border-top: 1px solid #0d1f3c;
    }
  </style>
</head>
<body>

<header>
  <h1>Far North</h1>
  <p>A visual journey through the Arctic &amp; Subarctic wilderness</p>
</header>

<div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="aurora">Aurora</button>
  <button data-filter="wildlife">Wildlife</button>
  <button data-filter="landscape">Landscape</button>
  <button data-filter="ice">Ice &amp; Snow</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <button class="close-btn" id="closeBtn">&times;</button>
  <button class="nav-btn prev" id="prevBtn">&#8249;</button>
  <img src="" alt="" id="lightboxImg" />
  <p class="caption" id="lightboxCaption"></p>
  <button class="nav-btn next" id="nextBtn">&#8250;</button>
</div>

<footer>Images sourced from Unsplash &mdash; Far North Gallery &copy; 2026</footer>

<script>
  const images = [
    {
      src: "https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80",
      title: "Aurora Borealis",
      category: "aurora",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1579033461380-adb38e6e3ee4?w=800&q=80",
      title: "Northern Lights over Mountains",
      category: "aurora",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=800&q=80",
      title: "Arctic Fox",
      category: "wildlife",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?w=800&q=80",
      title: "Polar Bear",
      category: "wildlife",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=800&q=80",
      title: "Reindeer in Snow",
      category: "wildlife",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80",
      title: "Arctic Tundra",
      category: "landscape",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&q=80",
      title: "Midnight Sun Valley",
      category: "landscape",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=800&q=80",
      title: "Frozen Lake",
      category: "ice",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1548695607-9c73430c48b4?w=800&q=80",
      title: "Iceberg",
      category: "ice",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1418985991508-e47386d96a71?w=800&q=80",
      title: "Snow-Covered Forest",
      category: "landscape",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1477601263568-180e2c6d046e?w=800&q=80",
      title: "Winter Wilderness",
      category: "landscape",
      credit: "Unsplash"
    },
    {
      src: "https://images.unsplash.com/photo-1525785967371-87ba44b3e6cf?w=800&q=80",
      title: "Glacier Blues",
      category: "ice",
      credit: "Unsplash"
    }
  ];

  let filtered = [...images];
  let currentIndex = 0;

  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCaption = document.getElementById('lightboxCaption');

  function renderGallery(items) {
    gallery.innerHTML = '';
    items.forEach((img, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${img.src}" alt="${img.title}" loading="lazy" />
        <div class="info">
          <h3>${img.title}</h3>
          <span>${img.category}</span>
        </div>`;
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const img = filtered[currentIndex];
    lightboxImg.src = img.src.replace('w=800', 'w=1200');
    lightboxImg.alt = img.title;
    lightboxCaption.textContent = img.title;
  }

  document.getElementById('closeBtn').addEventListener('click', closeLightbox);

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
    updateLightbox();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % filtered.length;
    updateLightbox();
  });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + filtered.length) % filtered.length; updateLightbox(); }
    if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % filtered.length; updateLightbox(); }
  });

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      filtered = f === 'all' ? [...images] : images.filter(img => img.category === f);
      renderGallery(filtered);
    });
  });

  renderGallery(filtered);
</script>
</body>
</html>
